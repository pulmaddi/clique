<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Ishta — Document</title>
<style>
  :root{--saffron:#E8741E;--maroon:#7A1F2B;--cream:#FFF6EC;--ink:#2A2118;--muted:#8A7B6B;--line:#E7D9C7}
  *{box-sizing:border-box}
  body{margin:0;background:#efe7da;font-family:"Segoe UI",system-ui,Arial,sans-serif;color:var(--ink)}
  .bar{position:sticky;top:0;background:linear-gradient(135deg,var(--maroon),var(--saffron));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;z-index:10}
  .bar a{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.18);padding:6px 12px;border-radius:18px}
  .bar b{font-size:15px}
  main{max-width:820px;margin:24px auto 60px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px 40px;line-height:1.65;box-shadow:0 4px 16px rgba(0,0,0,.06)}
  main h1{color:var(--maroon);border-bottom:2px solid var(--line);padding-bottom:8px}
  main h2{color:var(--maroon);margin-top:30px}
  main h3{color:var(--saffron)}
  main code{background:#f4ecdf;padding:2px 6px;border-radius:5px;font-size:90%}
  main pre{background:#1d1712;color:#f4ecdf;padding:16px;border-radius:10px;overflow:auto;font-size:13px}
  main pre code{background:none;color:inherit}
  main table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
  main th,main td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
  main th{background:#fbf3e7}
  main blockquote{border-left:4px solid var(--saffron);margin:14px 0;padding:6px 16px;background:#fff7ef;color:#5b4a38;border-radius:0 8px 8px 0}
  main a{color:var(--saffron)}
  .err{color:#b00;padding:20px}
</style>
</head>
<body>
<div class="bar">
  <a href="preview.html">← Back</a>
  <b>🪔 Ishta</b>
  <span id="docname" style="font-size:12px;opacity:.85"></span>
</div>
<main id="content"><p style="color:var(--muted)">Loading…</p></main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  function param(n){return new URLSearchParams(location.search).get(n);}
  // Only allow loading markdown files from the docs folder (no arbitrary paths).
  var doc = (param('doc')||'docs/REQUIREMENTS.md');
  if(!/^docs\/[\w/.-]+\.md$/.test(doc)){doc='docs/REQUIREMENTS.md';}
  document.getElementById('docname').textContent = doc.split('/').pop();
  fetch(doc).then(function(r){if(!r.ok)throw new Error(r.status);return r.text();})
    .then(function(md){
      // Rewrite links to other local .md docs so they open inside this viewer.
      var html = marked.parse(md);
      html = html.replace(/href="((?:\.\.\/)?docs\/[\w/.-]+\.md)"/g, function(_,p){
        return 'href="view.html?doc='+p.replace(/^\.\.\//,'')+'"';
      });
      document.getElementById('content').innerHTML = html;
    })
    .catch(function(e){
      document.getElementById('content').innerHTML =
        '<div class="err">Could not load <b>'+doc+'</b> ('+e.message+'). '+
        'If you opened this file directly from disk, view it through the hosted site or a local web server instead.</div>';
    });
</script>
</body>
</html>

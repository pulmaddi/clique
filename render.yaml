# Render Blueprint — deploys the preview/requirements portal as a static site.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ishta-preview
    runtime: static
    # No build step — these are plain HTML/Markdown files served as-is.
    buildCommand: ""
    # Serve the repository root (index.html, view.html, docs/, wireframes).
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      # Keep the client preview out of search engines.
      - path: /*
        name: X-Robots-Tag
        value: noindex
